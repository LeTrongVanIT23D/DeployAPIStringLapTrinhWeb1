server.port=${PORT:8080}

# === CẤU HÌNH DATABASE MẶC ĐỊNH LÀ H2 ĐỂ DEPLOY RENDER KHÔNG BỊ LỖI ===
spring.datasource.url=jdbc:h2:mem:school;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# === NẾU MUỐN CHẠY SQL SERVER Ở LOCAL (MÁY CÁ NHÂN), HÃY BỎ COMMENT CÁC DÒNG DƯỚI VÀ COMMENT LẠI CÁC DÒNG H2 Ở TRÊN ===
# spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=school;encrypt=true;trustServerCertificate=true
# spring.datasource.username=sa
# spring.datasource.password=123456
# spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver
# spring.jpa.hibernate.ddl-auto=none
# spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect

# Giúp bạn nhìn thấy lỗi thực sự trong Console
spring.jpa.show-sql=true


server.error.include-message=always
server.error.include-binding-errors=always
